events {}

http {
  server {
    listen 80;
    server_name app.sampleproject.site;
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    server_name api.sampleproject.site;
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name app.sampleproject.site;
    ssl_certificate /etc/letsencrypt/live/app.sampleproject.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sampleproject.site/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    root /usr/share/nginx/html;
    index index.html;
    location / {
      try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
  }

  server {
    listen 443 ssl;
    server_name api.sampleproject.site;
    ssl_certificate /etc/letsencrypt/live/api.sampleproject.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sampleproject.site/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    location / {
      proxy_pass http://api:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
  }
}