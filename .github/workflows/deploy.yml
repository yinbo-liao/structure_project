name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Backend quick checks
        run: |
          python -m compileall backend/app
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy frontend build to server
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete
          path: frontend/dist/
          remote_path: /srv/sample_project/frontend/dist/
          remote_host: ${{ secrets.PROD_SSH_HOST }}
          remote_user: ${{ secrets.PROD_SSH_USER }}
          remote_key: ${{ secrets.PROD_SSH_KEY }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            if [ ! -d "/srv/sample_project" ]; then
              git clone https://github.com/Marshmellow589/sample_project.git /srv/sample_project
            fi
            cd /srv/sample_project
            git fetch origin main
            git reset --hard origin/main
            echo POSTGRES_DB=${POSTGRES_DB:-appdb} > deploy/.env
            echo POSTGRES_USER=${POSTGRES_USER:-appuser} >> deploy/.env
            echo POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme} >> deploy/.env
            echo JWT_SECRET=${JWT_SECRET:-please-change} >> deploy/.env
            echo CERTBOT_EMAIL=${CERTBOT_EMAIL:-${{ secrets.CERTBOT_EMAIL }}} >> deploy/.env
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env run --rm certbot certonly --webroot -w /var/www/certbot -d app.sampleproject.site -d api.sampleproject.site --agree-tos -m ${{ secrets.CERTBOT_EMAIL }} || true
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env exec -T nginx nginx -s reload || true