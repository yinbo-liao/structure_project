# PostgreSQL Configuration for Project QA Data Management System
# Optimized for production workload with mixed read/write operations

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Listen on all interfaces
listen_addresses = '*'

# Maximum number of concurrent connections
max_connections = 100

# Authentication
password_encryption = scram-sha-256

#------------------------------------------------------------------------------
# RESOURCE USAGE
#------------------------------------------------------------------------------

# Memory
shared_buffers = 256MB                  # 25% of available RAM
effective_cache_size = 1GB              # 50% of available RAM
work_mem = 4MB                          # For simple queries
maintenance_work_mem = 64MB             # For VACUUM, CREATE INDEX, etc.

# Disk
temp_buffers = 8MB
max_prepared_transactions = 0           # Disable prepared transactions for now

#------------------------------------------------------------------------------
# WRITE AHEAD LOG
#------------------------------------------------------------------------------

wal_level = replica                     # Needed for replication
fsync = on                              # Guarantee durability
synchronous_commit = on                 # Full ACID compliance
wal_buffers = 16MB                      # Default is -1 (1/32 of shared_buffers)
wal_writer_delay = 200ms                # Default 200ms
checkpoint_timeout = 5min               # Checkpoint interval
max_wal_size = 1GB                      # Maximum WAL size before checkpoint
min_wal_size = 80MB                     # Minimum WAL size
checkpoint_completion_target = 0.9      # Spread checkpoints

#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

# Planner Cost Constants
random_page_cost = 1.1                  # Lower for SSD
effective_io_concurrency = 200          # For SSDs

# Genetic Query Optimizer
geqo = on
geqo_threshold = 12

# Other Planner Settings
default_statistics_target = 100         # More statistics for better plans
constraint_exclusion = partition        # Only for partitioned tables

#------------------------------------------------------------------------------
# ERROR REPORTING AND LOGGING
#------------------------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 10MB
log_min_duration_statement = 1000       # Log slow queries (>1 second)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on                     # Log deadlocks
log_temp_files = 0                      # Log all temporary file usage

#------------------------------------------------------------------------------
# RUNTIME STATISTICS
#------------------------------------------------------------------------------

track_activities = on
track_counts = on
track_io_timing = on
track_functions = all                   # Track all function calls
track_activity_query_size = 1024        # Increase from default 1024

# Statistics
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.save = on

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 3              # Number of autovacuum processes
autovacuum_naptime = 1min               # Time between autovacuum runs
autovacuum_vacuum_threshold = 50        # Min number of row updates before vacuum
autovacuum_analyze_threshold = 50       # Min number of row updates before analyze
autovacuum_vacuum_scale_factor = 0.2    # Fraction of table size before vacuum
autovacuum_analyze_scale_factor = 0.1   # Fraction of table size before analyze
autovacuum_vacuum_cost_limit = 2000     # Default vacuum cost limit
autovacuum_vacuum_cost_delay = 20ms     # Default vacuum cost delay

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

# Statement Behavior
statement_timeout = 30000               # 30 second statement timeout
lock_timeout = 10000                    # 10 second lock timeout
idle_in_transaction_session_timeout = 60000  # 60 second idle timeout

# Locale and Formatting
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

deadlock_timeout = 1s                   # Time to wait on a lock before checking for deadlock
max_locks_per_transaction = 64          # Default is 64

#------------------------------------------------------------------------------
# VERSION/PLATFORM COMPATIBILITY
#------------------------------------------------------------------------------

# These settings are for PostgreSQL 15
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off
bytea_output = 'hex'
xmlbinary = 'base64'
xmloption = 'content'

#------------------------------------------------------------------------------
# CUSTOM SETTINGS FOR APPLICATION
#------------------------------------------------------------------------------

# Enable extensions that might be useful
shared_preload_libraries = 'pg_stat_statements'

# Timezone handling
timezone_abbreviations = 'Default'

# Enable parallel queries
max_parallel_workers_per_gather = 2     # Number of parallel workers
max_parallel_workers = 8                # Maximum parallel workers
parallel_leader_participation = on

# Enable JIT compilation for complex queries
jit = on
jit_above_cost = 100000                 # Use JIT for queries with cost > 100k
jit_inline_above_cost = 500000          # Inline functions for queries with cost > 500k
jit_optimize_above_cost = 500000        # Optimize for queries with cost > 500k
